# ══════════════════════════════════════════════════════════════
# Tutti — K8s Main Server Deployment
# ══════════════════════════════════════════════════════════════
#
# 💡 온프레미스 AI 서버 마이그레이션 완료:
#   • AI_SERVER_URL, AI_SERVER_HOST → tutti-secrets에서 주입 (주소 은닉)
#   • CALLBACK_BASE_URL → tutti-secrets에서 주입
#   • replicas: 1 (HPA가 스케일업 담당, Spot VM 비용 최소화)
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-server
  namespace: tutti
  labels:
    app: main-server
    tier: backend
spec:
  replicas: 1  # 💰 Spot VM 비용 최소화: HPA가 필요 시 스케일업
  # ⚠️ 단일 레플리카에서 무중단 배포를 위한 전략
  # maxUnavailable: 0 → 새 파드가 Ready되기 전까지 기존 파드를 유지
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: main-server
  template:
    metadata:
      labels:
        app: main-server
        tier: backend
    spec:
      containers:
        - name: main-server
          image: REGION-docker.pkg.dev/PROJECT_ID/tutti/main-server:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            # ── Supabase Database ──
            - name: SUPABASE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: supabase-db-url
            - name: SUPABASE_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: supabase-db-username
            - name: SUPABASE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: supabase-db-password
            # ── Supabase API (프론트엔드 연동용) ──
            - name: SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: supabase-key
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: supabase-url
            # ── JWT ──
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: jwt-secret
            # ── AI Server (On-Premise, Cloudflare Tunnel 경유) ──
            # 온프레미스 RTX 4090 GPU 서버로 직접 요청 (Cloudflare Tunnel 경유)
            # Host 헤더는 WebClientConfig에서 AI_SERVER_HOST 값으로 설정됨
            - name: AI_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: ai-server-url
            - name: AI_SERVER_HOST
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: ai-server-host
            # ── AI Server 인증 (2중 보안) ──
            # Layer 1: Cloudflare Access Service Token (네트워크 레벨 — 터널 접근 자체를 차단)
            # Layer 2: X-API-Key (애플리케이션 레벨 — AI 서버에서 직접 검증)
            - name: AI_SERVER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: ai-server-api-key
            - name: CF_ACCESS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: cf-access-client-id
            - name: CF_ACCESS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: cf-access-client-secret
            # ── Callback URL (AI서버 → 메인서버 콜백용 공개 URL) ──
            - name: CALLBACK_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: callback-base-url
            # ── AI Callback Secret ──
            - name: AI_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: ai-callback-secret
            # ── Google OAuth ──
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tutti-secrets
                  key: google-client-secret
          resources:
            requests:
              cpu: "250m"       # e2-medium(2 vCPU)에 적합한 요청
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"   # Spring Boot 앱에 충분한 메모리
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
      terminationGracePeriodSeconds: 30
