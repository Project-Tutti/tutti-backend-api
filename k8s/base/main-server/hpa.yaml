apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: main-server-hpa
  namespace: tutti
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: main-server
  minReplicas: 2   # 🛡️ 롤링 업데이트 시 최소 1대 유지 보장 (maxUnavailable: 0 + minReplicas: 2)
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
