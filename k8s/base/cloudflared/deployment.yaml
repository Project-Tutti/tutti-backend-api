# ══════════════════════════════════════════════════════════════
# Tutti — Cloudflare Tunnel Agent (cloudflared)
# ══════════════════════════════════════════════════════════════
#
# 💡 포트폴리오 POINT: GCE LoadBalancer($18+/월) + 고정 IP($7.30/월) 대신
#   Cloudflare Tunnel(무료)을 사용하여 외부 트래픽을 GKE 내부로 라우팅.
#   - SSL/TLS 종료: Cloudflare Edge에서 처리 (무료)
#   - DDoS 보호: Cloudflare WAF (무료 티어)
#   - 외부 IP 할당 불필요 → 비용 $0
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: tutti
  labels:
    app: cloudflared
    tier: network
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
        tier: network
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - cloudflared
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: cloudflared
          # ⚠️ 고정 버전 사용 — latest는 예기치 않은 업데이트로 장애 유발 가능
          image: cloudflare/cloudflared:2024.12.2
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:20241
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-tunnel-secret
                  key: tunnel-token
          # 보안: 읽기 전용 루트 파일시스템 + non-root 실행
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # cloudflared는 --metrics 0.0.0.0:2000 플래그로 메트릭 서버 활성화 필요
          # 기본적으로 /ready 엔드포인트를 제공하지 않으므로 TCP 소켓 체크 사용
          livenessProbe:
            tcpSocket:
              port: 20241
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 20241
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
