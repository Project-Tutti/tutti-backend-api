# ══════════════════════════════════════════════════════════════
# Promtail — Helm values (GKE Pod 로그 수집)
# ══════════════════════════════════════════════════════════════
#
# 설치 명령:
#   helm install promtail grafana/promtail \
#     --namespace monitoring \
#     -f promtail-values.yaml
#
# ══════════════════════════════════════════════════════════════

config:
  clients:
    - url: http://loki.monitoring:3100/loki/api/v1/push
  # 로그 라벨 자동 부여
  snippets:
    pipelineStages:
      # GKE containerd (CRI) 로그 포맷 파싱
      - cri: {}
      # tutti 네임스페이스의 JSON 로그만 구조화 파싱
      # (Spring Boot 시작 배너 등 non-JSON 라인은 자동 스킵)
      - match:
          selector: '{namespace="tutti"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger_name    # LogstashEncoder 필드명
            - labels:
                level:
                logger:

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
