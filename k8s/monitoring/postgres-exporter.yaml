# ══════════════════════════════════════════════════════════════
# postgres-exporter — Supabase PostgreSQL 메트릭 수집
# ══════════════════════════════════════════════════════════════
#
# Supabase Free Plan 영향도:
#   • pg_stat_activity, pg_stat_user_tables 등 시스템 카탈로그만 조회
#   • 60초 간격 → 일 1,440회 조회 (쿼리 크레딧 무관)
#   • Pooler 포트(6543) 경유 → 커넥션 슬롯 미소비
#
# ⚠️ 배포 전 시크릿 생성 필요:
#   kubectl create secret generic supabase-monitor-secret \
#     --namespace monitoring \
#     --from-literal=username='YOUR_SUPABASE_DB_USER' \
#     --from-literal=password='YOUR_SUPABASE_DB_PASSWORD'
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: monitoring
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          env:
            - name: DATA_SOURCE_URI
              valueFrom:
                secretKeyRef:
                  name: supabase-monitor-secret
                  key: data-source-uri
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: supabase-monitor-secret
                  key: username
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: supabase-monitor-secret
                  key: password
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          ports:
            - containerPort: 9187
              name: metrics
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9187
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9187
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: monitoring
  labels:
    app: postgres-exporter
spec:
  type: ClusterIP
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187
      protocol: TCP
      name: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: monitoring
  labels:
    app: postgres-exporter
    release: prometheus
spec:
  selector:
    matchLabels:
      app: postgres-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 60s    # 💡 Free Plan 부하 최소화: 60초 간격
