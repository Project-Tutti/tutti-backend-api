# ══════════════════════════════════════════════════════════════
# Remote Write 인증 시크릿 (학교 서버 → GKE Prometheus)
# ══════════════════════════════════════════════════════════════
#
# 학교 서버의 Grafana Alloy가 Remote Write로 메트릭을 푸시할 때
# Basic Auth 인증에 사용되는 시크릿입니다.
#
# ⚠️ 이 파일은 템플릿입니다. 실제 배포 시 비밀번호를 변경하세요:
#   kubectl create secret generic remote-write-auth \
#     --namespace monitoring \
#     --from-literal=username='school-server' \
#     --from-literal=password='YOUR_STRONG_PASSWORD_HERE'
#
# Prometheus의 web.yml에서 Basic Auth를 설정하려면
# kube-prometheus-stack values에 다음을 추가하세요:
#
#   prometheus:
#     prometheusSpec:
#       web:
#         httpConfig:
#           http2: true
#       # 또는 Cloudflare Tunnel + Access 정책으로 인증 대체
#
---
apiVersion: v1
kind: Secret
metadata:
  name: remote-write-auth
  namespace: monitoring
  labels:
    purpose: school-server-auth
type: Opaque
stringData:
  username: "school-server"
  password: "CHANGE_ME_TO_STRONG_PASSWORD"
