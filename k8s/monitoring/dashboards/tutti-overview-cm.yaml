apiVersion: v1
kind: ConfigMap
metadata:
  name: tutti-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  tutti-overview.json: |-
    {
        "annotations": {
            "list": []
        },
        "editable": true,
        "graphTooltip": 1,
        "links": [],
        "panels": [
            {
                "collapsed": false,
                "gridPos": {
                    "h": 1,
                    "w": 24,
                    "x": 0,
                    "y": 0
                },
                "id": 1,
                "panels": [],
                "title": "🌟 클러스터 통합 가동 상태 리스트 (Status Overview)",
                "type": "row"
            },
            {
                "title": "전체 서비스 구동 상태 모음 (Main / AI / Converter / DB / Redis / CF Tunnel)",
                "type": "table",
                "id": 2,
                "gridPos": {
                    "h": 12,
                    "w": 24,
                    "x": 0,
                    "y": 1
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "kube_pod_status_ready{condition=\"true\", pod=~\".*main-server.*\"}",
                        "format": "time_series",
                        "instant": true,
                        "legendFormat": "{{pod}}",
                        "refId": "A"
                    },
                    {
                        "expr": "up{job=\"node_scrape\"}",
                        "format": "time_series",
                        "instant": true,
                        "legendFormat": "ai-server (외부 온프레미스)",
                        "refId": "B"
                    },
                    {
                        "expr": "kube_pod_status_ready{condition=\"true\", pod=~\".*converter.*\"}",
                        "format": "time_series",
                        "instant": true,
                        "legendFormat": "{{pod}}",
                        "refId": "C"
                    },
                    {
                        "expr": "pg_up",
                        "format": "time_series",
                        "instant": true,
                        "legendFormat": "supabase-db (외부/내부)",
                        "refId": "E"
                    },
                    {
                        "expr": "up{job=\"cloudflared-metrics\"}",
                        "format": "time_series",
                        "instant": true,
                        "legendFormat": "cf-tunnel",
                        "refId": "F"
                    },
                    {
                        "expr": "kube_pod_status_ready{condition=\"true\", pod=~\".*frontend.*\"}",
                        "format": "time_series",
                        "instant": true,
                        "legendFormat": "{{pod}}",
                        "refId": "G"
                    }
                ],
                "transformations": [
                    {
                        "id": "reduce",
                        "options": {
                            "includeTimeField": false,
                            "mode": "seriesToRows",
                            "reducers": [
                                "lastNotNull"
                            ]
                        }
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "mappings": [
                            {
                                "options": {
                                    "0": {
                                        "color": "red",
                                        "text": "🔴 DOWN (에러)"
                                    },
                                    "1": {
                                        "color": "green",
                                        "text": "🟢 UP (정상)"
                                    }
                                },
                                "type": "value"
                            }
                        ],
                        "custom": {
                            "align": "left"
                        }
                    },
                    "overrides": [
                        {
                            "matcher": {
                                "id": "byType",
                                "options": "number"
                            },
                            "properties": [
                                {
                                    "id": "displayName",
                                    "value": "STATUS"
                                },
                                {
                                    "id": "custom.align",
                                    "value": "center"
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byType",
                                "options": "string"
                            },
                            "properties": [
                                {
                                    "id": "displayName",
                                    "value": "서비스 인스턴스 (INSTANCE)"
                                }
                            ]
                        }
                    ]
                },
                "options": {
                    "showHeader": true
                }
            },
            {
                "collapsed": false,
                "gridPos": {
                    "h": 1,
                    "w": 24,
                    "x": 0,
                    "y": 10
                },
                "id": 3,
                "panels": [],
                "title": "⚙️ 시스템 리소스 (Infrastructure)",
                "type": "row"
            },
            {
                "title": "CPU 사용량 및 Limit (Cores)",
                "type": "timeseries",
                "id": 4,
                "gridPos": {
                    "h": 8,
                    "w": 8,
                    "x": 0,
                    "y": 11
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "drawStyle": "line",
                            "fillOpacity": 15,
                            "gradientMode": "scheme"
                        },
                        "unit": "cores"
                    }
                },
                "options": {
                    "tooltip": {
                        "mode": "multi",
                        "sort": "none"
                    }
                },
                "targets": [
                    {
                        "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"tutti\", container=\"main-server\"}[1m]))",
                        "legendFormat": "Main Server CPU 사용",
                        "refId": "A"
                    },
                    {
                        "expr": "sum(kube_pod_container_resource_limits{namespace=\"tutti\", container=\"main-server\", resource=\"cpu\"})",
                        "legendFormat": "Main Server CPU 한도(Limit)",
                        "refId": "B"
                    }
                ]
            },
            {
                "title": "메모리 사용량 및 Limit (Bytes)",
                "type": "timeseries",
                "id": 5,
                "gridPos": {
                    "h": 8,
                    "w": 8,
                    "x": 8,
                    "y": 11
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "drawStyle": "line",
                            "fillOpacity": 15,
                            "gradientMode": "scheme"
                        },
                        "unit": "bytes"
                    }
                },
                "options": {
                    "tooltip": {
                        "mode": "multi",
                        "sort": "none"
                    }
                },
                "targets": [
                    {
                        "expr": "sum(container_memory_working_set_bytes{namespace=\"tutti\", container=\"main-server\"})",
                        "legendFormat": "Main RAM 사용",
                        "refId": "A"
                    },
                    {
                        "expr": "sum(kube_pod_container_resource_limits{namespace=\"tutti\", container=\"main-server\", resource=\"memory\"})",
                        "legendFormat": "Main RAM 한도(Limit)",
                        "refId": "B"
                    }
                ]
            },
            {
                "title": "네트워크 트래픽 (Bytes/s)",
                "type": "timeseries",
                "id": 6,
                "gridPos": {
                    "h": 8,
                    "w": 8,
                    "x": 16,
                    "y": 11
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "drawStyle": "line",
                            "fillOpacity": 15,
                            "gradientMode": "scheme"
                        },
                        "unit": "Bps"
                    }
                },
                "options": {
                    "tooltip": {
                        "mode": "multi",
                        "sort": "none"
                    }
                },
                "targets": [
                    {
                        "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"tutti\"}[1m]))",
                        "legendFormat": "Receive",
                        "refId": "A"
                    },
                    {
                        "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"tutti\"}[1m]))",
                        "legendFormat": "Transmit",
                        "refId": "B"
                    }
                ]
            },
            {
                "collapsed": false,
                "gridPos": {
                    "h": 1,
                    "w": 24,
                    "x": 0,
                    "y": 20
                },
                "id": 7,
                "panels": [],
                "title": "🚦 애플리케이션 지표 (Application)",
                "type": "row"
            },
            {
                "title": "초당 HTTP 요청 수",
                "type": "timeseries",
                "id": 8,
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 0,
                    "y": 21
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "drawStyle": "bars",
                            "fillOpacity": 80
                        },
                        "unit": "reqps"
                    }
                },
                "options": {
                    "tooltip": {
                        "mode": "multi",
                        "sort": "none"
                    }
                },
                "targets": [
                    {
                        "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"tutti\"}[1m])) by (method)",
                        "legendFormat": "{{method}}",
                        "refId": "A"
                    }
                ]
            },
            {
                "title": "HTTP 95퍼센타일 응답 지연율 (Seconds)",
                "type": "timeseries",
                "id": 9,
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 12,
                    "y": 21
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "drawStyle": "line",
                            "fillOpacity": 10,
                            "gradientMode": "scheme"
                        },
                        "unit": "s"
                    }
                },
                "options": {
                    "tooltip": {
                        "mode": "multi",
                        "sort": "none"
                    }
                },
                "targets": [
                    {
                        "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{namespace=\"tutti\"}[5m])) by (le))",
                        "legendFormat": "p95 latency",
                        "refId": "A"
                    }
                ]
            },
            {
                "title": "데이터베이스 커넥션 풀",
                "type": "timeseries",
                "id": 10,
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 0,
                    "y": 29
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "drawStyle": "line",
                            "fillOpacity": 20,
                            "gradientMode": "scheme"
                        }
                    }
                },
                "options": {
                    "tooltip": {
                        "mode": "multi",
                        "sort": "none"
                    }
                },
                "targets": [
                    {
                        "expr": "sum(hikaricp_connections_active{namespace=\"tutti\"})",
                        "legendFormat": "Active",
                        "refId": "A"
                    },
                    {
                        "expr": "sum(hikaricp_connections_idle{namespace=\"tutti\"})",
                        "legendFormat": "Idle",
                        "refId": "B"
                    },
                    {
                        "expr": "sum(hikaricp_connections_max{namespace=\"tutti\"})",
                        "legendFormat": "Max Limit",
                        "refId": "C"
                    }
                ]
            },
            {
                "title": "JVM 힙 메모리",
                "type": "timeseries",
                "id": 11,
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 12,
                    "y": 29
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "drawStyle": "line",
                            "fillOpacity": 20,
                            "gradientMode": "scheme"
                        },
                        "unit": "bytes"
                    }
                },
                "options": {
                    "tooltip": {
                        "mode": "multi",
                        "sort": "none"
                    }
                },
                "targets": [
                    {
                        "expr": "sum(jvm_memory_used_bytes{namespace=\"tutti\", area=\"heap\"})",
                        "legendFormat": "Used",
                        "refId": "A"
                    },
                    {
                        "expr": "sum(jvm_memory_max_bytes{namespace=\"tutti\", area=\"heap\"})",
                        "legendFormat": "Max Limit",
                        "refId": "B"
                    }
                ]
            },
            {
                "collapsed": false,
                "gridPos": {
                    "h": 1,
                    "w": 24,
                    "x": 0,
                    "y": 40
                },
                "id": 12,
                "panels": [],
                "title": "📋 실시간 로그 (↑ 상단 드롭다운에서 모듈 선택 / 패널 내 Ctrl+F로 검색)",
                "type": "row"
            },
            {
                "title": "🔎 실시간 로그 포커스 뷰",
                "type": "logs",
                "id": 13,
                "gridPos": {
                    "h": 25,
                    "w": 24,
                    "x": 0,
                    "y": 41
                },
                "datasource": {
                    "type": "loki",
                    "uid": "loki"
                },
                "options": {
                    "showTime": true,
                    "showLabels": true,
                    "wrapLogMessage": true,
                    "enableLogDetails": true,
                    "sortOrder": "Descending",
                    "prettifyLogMessage": true
                },
                "targets": [
                    {
                        "expr": "$log_module",
                        "refId": "A"
                    }
                ]
            }
        ],
        "refresh": "10s",
        "schemaVersion": 38,
        "style": "dark",
        "tags": [
            "tutti",
            "kubernetes"
        ],
        "templating": {
            "list": [
                {
                    "name": "log_module",
                    "label": "📋 로그 모듈",
                    "type": "custom",
                    "query": "📝 Main Server (App) : {container=\"main-server\"} != \"HTTP (\", 🔍 Main Server (API) : {container=\"main-server\"} |= \"HTTP (\", 🧠 AI Server : {container=\"tutti-backend-ai-ai-worker-1\"} != \"복구할 Pending 메시지 없음\", 🔄 Converter : {container=\"converter-service\"} != \"GET /health\", 🌐 Cloudflared : {container=\"cloudflared\"}, 🖥️ Frontend : {container=\"frontend\"}",
                    "current": {
                        "text": "📝 Main Server (App)",
                        "value": "{container=\"main-server\"} != \"HTTP (\""
                    },
                    "options": [
                        {
                            "text": "📝 Main Server (App)",
                            "value": "{container=\"main-server\"} != \"HTTP (\"",
                            "selected": true
                        },
                        {
                            "text": "🔍 Main Server (API)",
                            "value": "{container=\"main-server\"} |= \"HTTP (\"",
                            "selected": false
                        },
                        {
                            "text": "🧠 AI Server",
                            "value": "{container=\"tutti-backend-ai-ai-worker-1\"} != \"복구할 Pending 메시지 없음\"",
                            "selected": false
                        },
                        {
                            "text": "🔄 Converter",
                            "value": "{container=\"converter-service\"} != \"GET /health\"",
                            "selected": false
                        },
                        {
                            "text": "🌐 Cloudflared",
                            "value": "{container=\"cloudflared\"}",
                            "selected": false
                        },
                        {
                            "text": "🖥️ Frontend",
                            "value": "{container=\"frontend\"}",
                            "selected": false
                        }
                    ],
                    "hide": 0,
                    "includeAll": false,
                    "multi": false
                }
            ]
        },
        "time": {
            "from": "now-3h",
            "to": "now"
        },
        "timepicker": {},
        "timezone": "Asia/Seoul",
        "title": "Tutti — 서비스 Overview",
        "uid": "tutti-overview",
        "version": 5
    }
