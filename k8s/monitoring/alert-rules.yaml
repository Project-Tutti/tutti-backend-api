# ══════════════════════════════════════════════════════════════
# PrometheusRule — Tutti 핵심 알림 규칙
# ══════════════════════════════════════════════════════════════
#
# Alertmanager가 설치되어 있으나 규칙이 없어 알림이 발생하지 않던
# 문제를 해결합니다. 아래 규칙들은 프로덕션에서 반드시 감지해야 하는
# 핵심 장애 시나리오를 다룹니다.
#
# 알림 수신 설정 (Slack, Discord 등)은 Alertmanager ConfigMap에서
# 별도로 구성하세요.
#
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tutti-alerts
  namespace: monitoring
  labels:
    release: prometheus    # kube-prometheus-stack이 이 라벨로 PrometheusRule 검색
    app: tutti
spec:
  groups:
    # ── 서비스 가동 상태 ──
    - name: tutti.availability
      rules:
        - alert: MainServerDown
          expr: up{job="main-server"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Main Server가 다운되었습니다"
            description: "{{ $labels.pod }} Pod의 Actuator 엔드포인트가 2분 이상 응답하지 않습니다."

        - alert: AIServerUnreachable
          expr: up{job="node_scrape"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "AI Server(온프레미스)에서 메트릭 수신이 중단되었습니다"
            description: "Alloy 에이전트가 5분 이상 메트릭을 Push하지 않고 있습니다. Alloy crash 또는 네트워크 장애를 확인하세요."

        - alert: CloudflareTunnelDown
          expr: up{job="cloudflared-metrics"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Cloudflare Tunnel이 다운되었습니다"
            description: "외부 트래픽이 클러스터에 도달하지 못합니다. 즉시 확인 필요."

        - alert: PostgresExporterDown
          expr: pg_up == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Supabase DB 연결이 끊겼습니다"
            description: "postgres-exporter가 Supabase Pooler에 연결하지 못합니다. DB 점검 또는 크레덴셜 만료를 확인하세요."

    # ── 리소스 사용량 ──
    - name: tutti.resources
      rules:
        - alert: HighMemoryUsage
          expr: |
            (
              container_memory_working_set_bytes{namespace="tutti", container="main-server"}
              / on(pod, container) kube_pod_container_resource_limits{namespace="tutti", container="main-server", resource="memory"}
            ) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Main Server 메모리 사용률 85% 초과"
            description: "{{ $labels.pod }}의 메모리가 Limit의 {{ $value | humanizePercentage }}를 사용 중입니다. OOMKilled 위험."

        - alert: HighCPUUsage
          expr: |
            (
              sum(rate(container_cpu_usage_seconds_total{namespace="tutti", container="main-server"}[5m])) by (pod)
              / on(pod) sum(kube_pod_container_resource_limits{namespace="tutti", container="main-server", resource="cpu"}) by (pod)
            ) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Main Server CPU 사용률 90% 초과"
            description: "{{ $labels.pod }}의 CPU가 Limit의 {{ $value | humanizePercentage }}를 10분 이상 사용 중입니다."

        - alert: PVCNearlyFull
          expr: |
            (kubelet_volume_stats_used_bytes{namespace="monitoring"} 
            / kubelet_volume_stats_capacity_bytes{namespace="monitoring"}) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "모니터링 PVC 사용률 85% 초과"
            description: "{{ $labels.persistentvolumeclaim }}의 디스크가 {{ $value | humanizePercentage }} 사용 중입니다."

    # ── 애플리케이션 레벨 ──
    - name: tutti.application
      rules:
        - alert: DBConnectionPoolExhausted
          expr: hikaricp_connections_pending{namespace="tutti"} > 0
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "HikariCP 커넥션 풀에 대기 중인 쿼리가 있습니다"
            description: "3분 이상 pending 커넥션이 존재합니다. maximum-pool-size 증가 또는 slow query 점검 필요."

        - alert: HighHTTPErrorRate
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace="tutti", status=~"5.."}[5m]))
              / sum(rate(http_server_requests_seconds_count{namespace="tutti"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "HTTP 5xx 에러율 5% 초과"
            description: "최근 5분간 5xx 응답 비율이 {{ $value | humanizePercentage }}입니다."

        - alert: HighP95Latency
          expr: |
            histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{namespace="tutti"}[5m])) by (le))
            > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "HTTP P95 응답 시간이 3초를 초과합니다"
            description: "전체 API의 95퍼센타일 응답 시간이 {{ $value }}초입니다."

    # ── Pod 상태 ──
    - name: tutti.pods
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="tutti"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }}이 반복 재시작 중입니다"
            description: "최근 15분간 재시작 감지. CrashLoopBackOff 상태를 확인하세요."

        - alert: PodNotReady
          expr: kube_pod_status_ready{namespace="tutti", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }}이 Ready 상태가 아닙니다"
            description: "5분 이상 Not Ready 상태입니다."
