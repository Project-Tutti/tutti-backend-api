# ══════════════════════════════════════════════════════════════
# ServiceMonitor — Cloudflared (Tunnel 메트릭)
# ══════════════════════════════════════════════════════════════
# cloudflared가 이미 --metrics 0.0.0.0:20241 로 메트릭을 노출 중입니다.
# 이 ServiceMonitor를 통해 Prometheus가 터널 상태를 자동 수집합니다.
#
# ⚠️ 전제조건: cloudflared Service에 metrics 포트(20241)가 정의되어 있어야 합니다.
#    현재 cloudflared에 Service가 없으므로, 아래 Service를 먼저 적용해야 합니다.
#
---
# cloudflared 메트릭용 Service (현재 미존재 → 새로 생성)
apiVersion: v1
kind: Service
metadata:
  name: cloudflared-metrics
  namespace: tutti
  labels:
    app: cloudflared
spec:
  type: ClusterIP
  selector:
    app: cloudflared
  ports:
    - port: 20241
      targetPort: 20241
      protocol: TCP
      name: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudflared
  namespace: monitoring
  labels:
    app: cloudflared
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - tutti
  selector:
    matchLabels:
      app: cloudflared
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
