# ══════════════════════════════════════════════════════════════
# Tutti — K8s Secrets Template
# 
# ⚠️ 이 파일은 템플릿입니다. 실제 값을 채운 파일은 절대 커밋하지 마세요!
# 
# 사용법:
#   1. 이 파일을 복사: cp secrets-template.yaml secrets.yaml
#   2. 실제 값으로 교체 (base64 인코딩)
#   3. kubectl apply -f secrets.yaml -n tutti
#
# Base64 인코딩: echo -n 'your-value' | base64
#
# 💡 CI/CD에서는 GitHub Actions가 자동으로 K8s Secret을 생성합니다.
#    이 템플릿은 로컬/수동 배포 시에만 사용됩니다.
# ══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: tutti-secrets
  namespace: tutti
type: Opaque
data:
  # Supabase PostgreSQL (DB 접속 정보)
  supabase-db-url: <base64-encoded-jdbc-url>
  supabase-db-username: <base64-encoded-username>
  supabase-db-password: <base64-encoded-password>

  # Supabase API (프론트엔드 연동용)
  supabase-key: <base64-encoded-supabase-anon-key>
  supabase-url: <base64-encoded-supabase-project-url>

  # JWT
  jwt-secret: <base64-encoded-jwt-secret>

  # AI Server (온프레미스 서버 주소 — Git에 노출 방지)
  ai-server-url: <base64-encoded-ai-server-url>       # echo -n 'https://your-ai-domain' | base64
  ai-server-host: <base64-encoded-ai-server-host>     # echo -n 'your-ai-domain' | base64
  callback-base-url: <base64-encoded-callback-url>    # echo -n 'https://your-api-domain' | base64

  # AI Callback
  ai-callback-secret: <base64-encoded-callback-secret>

  # AI Server API Key (온프레미스 AI 서버 인증용)
  ai-server-api-key: <base64-encoded-api-key>

  # Cloudflare Access Service Token (네트워크 레벨 접근 제어)
  cf-access-client-id: <base64-encoded-cf-client-id>
  cf-access-client-secret: <base64-encoded-cf-client-secret>

  # Google OAuth
  google-client-id: <base64-encoded-google-client-id>
  google-client-secret: <base64-encoded-google-client-secret>

  # Redis (GKE 내부 메시지 브로커 — AI 요청 큐 + SSE 동기화)
  # echo -n 'redis.tutti.svc.cluster.local' | base64
  redis-host: <base64-encoded-redis-host>
  # echo -n '6379' | base64
  redis-port: <base64-encoded-redis-port>
  # echo -n 'your-redis-password' | base64
  redis-password: <base64-encoded-redis-password>
  # echo -n 'false' | base64 (GKE 내부 통신 — TLS 불필요)
  redis-tls: <base64-encoded-redis-tls>

---
# Cloudflare Tunnel Secret (별도 Secret으로 분리)
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel-secret
  namespace: tutti
type: Opaque
data:
  tunnel-token: <base64-encoded-cloudflare-tunnel-token>
