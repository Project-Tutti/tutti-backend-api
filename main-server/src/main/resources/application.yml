# ────────────────────────────────────────────────────────────
# Tutti Main Server — Application Configuration
# ────────────────────────────────────────────────────────────

spring:
  application:
    name: tutti-main-server

  profiles:
    active: local # 기본 프로필: local

  # ── Redis (요청 큐잉 + SSE 멀티 Pod 동기화) ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_TLS:false}

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: validate # 운영 안정성: 스키마 검증만 수행
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false # OSIV 비활성화 (성능 최적화)

  # ── File Upload ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false

# ── Server ──
server:
  port: 8080
  shutdown: graceful

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# ── JWT Configuration ──
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-development-only-change-in-production}
  access-token-expiration: 3600000 # 1시간 (ms)
  refresh-token-expiration: 1209600000 # 14일 (ms)

# ── SpringDoc (Swagger UI) ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# ── AI Server (On-Premise, Cloudflare Tunnel 경유) ──
# base-url: AI 서버 URL (프로덕션: AI_SERVER_URL 환경변수로 주입, 로컬: http://localhost:8000)
# host-header: Cloudflare Tunnel 라우팅을 위한 Host 헤더 값
# api-key: AI 서버 인증용 API 키 (허가되지 않은 요청 차단)
# cf-access-*: Cloudflare Access Service Token (네트워크 레벨 접근 제어)
ai:
  server:
    base-url: ${AI_SERVER_URL:http://localhost:8000}
    host-header: ${AI_SERVER_HOST:}
    api-key: ${AI_SERVER_API_KEY:}
    timeout: 120000 # 온프레미스 GPU 상시 가동, 콜드 스타트 불필요 (2분)
    callback-base-url: ${CALLBACK_BASE_URL:http://localhost:8080}
    callback-secret: ${AI_CALLBACK_SECRET:default-callback-secret}
    cf-access-client-id: ${CF_ACCESS_CLIENT_ID:}
    cf-access-client-secret: ${CF_ACCESS_CLIENT_SECRET:}

# ── Supabase Storage ──
supabase:
  storage:
    url: ${SUPABASE_URL:http://localhost:54321}
    key: ${SUPABASE_KEY:your-anon-key}

# ── Converter Service (MIDI ↔ MusicXML) ──
converter:
  server:
    base-url: ${CONVERTER_SERVER_URL:http://converter-service:8000}
    timeout: 60000

# ── Google OAuth ──
google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}

# ── Logging ──
logging:
  level:
    root: INFO
    com.tutti.server: DEBUG
    org.hibernate.SQL: DEBUG

---
# ══════════════════════════════════════════════════════════════
# Profile: local
# ══════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/tutti_dev
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # 로컬에서는 스키마 자동 업데이트

---
# ══════════════════════════════════════════════════════════════
# Profile: dev
# ══════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

---
# ══════════════════════════════════════════════════════════════
# Profile: prod
# ══════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    show-sql: false

# SEC-1: prod에서 JWT_SECRET 환경변수 필수 (기본값 없음 → 미설정 시 시작 실패)
jwt:
  secret: ${JWT_SECRET}

# Swagger UI — 전시 기간 동안 활성화
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# SEC-4: prod에서 콜백 시크릿 + AI 서버 API 키 필수
ai:
  server:
    callback-secret: ${AI_CALLBACK_SECRET}
    api-key: ${AI_SERVER_API_KEY}

logging:
  level:
    root: WARN
    com.tutti.server: INFO
