name: API E2E Testing Pipeline

on:
  workflow_run:
    workflows: ["CI/CD - Main Server"]
    types:
      - completed
    branches:
      - main

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest requests pretty_midi

    - name: Run Core API Tests (Auth, Users, Library)
      env:
        API_BASE_URL: "https://api.tutti.asia/api"
      run: |
        pytest tests/e2e/ -v -m "not ai_e2e"

    - name: Run AI E2E Tests (Non-blocking)
      continue-on-error: true
      env:
        API_BASE_URL: "https://api.tutti.asia/api"
      run: |
        echo "Running AI Integration Tests..."
        echo "If the external AI Worker is down or deploying, this step will timeout and fail gracefully without blocking the CI workflow."
        pytest tests/e2e/ -v -m "ai_e2e"
