# ══════════════════════════════════════════════════════════════
# Tutti — CI/CD: Build, Push & Deploy to GKE
# ══════════════════════════════════════════════════════════════
#
# 💡 포트폴리오 POINT: 단일 워크플로우에서 Test → Build → Push → Deploy를 수행
#   • Workload Identity Federation으로 GCP 키 없이 OIDC 인증
#   • Kustomize로 이미지 태그 업데이트 & 시크릿 주입
#   • Docker BuildKit + GHA 캐싱으로 빌드 속도 50%+ 향상
#
name: CI/CD - Main Server

on:
  push:
    branches: [main]
    paths:
      - "main-server/**"
      - "k8s/**"
      - ".github/workflows/ci-main.yml"
  pull_request:
    branches: [main]
    paths:
      - "main-server/**"

  # 수동 배포
  workflow_dispatch:

env:
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: ${{ secrets.GCP_PROJECT_ID }}/tutti/main-server
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}

jobs:
  # ================================================================
  # Job 1: Test — 단위 테스트 실행
  # ================================================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('main-server/**/*.gradle*', 'main-server/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run tests
        working-directory: main-server
        run: ./gradlew test --no-daemon

  # ================================================================
  # Job 2: Build & Push — Docker 이미지 빌드 후 Artifact Registry 푸시
  # ================================================================
  build-and-push:
    name: 🐳 Build & Push
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # 💡 Workload Identity Federation에 필요
    outputs:
      image-tag: ${{ steps.meta.outputs.short-sha }}
    steps:
      - uses: actions/checkout@v4

      # ── GCP 인증 (Workload Identity Federation) ──
      # GitHub → GCP 간 키리스 인증으로 보안 강화
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 이미지 태그 생성 ──
      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short-sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "📌 Image tag: ${SHORT_SHA}"

      # ── Docker 빌드 & 푸시 ──
      # BuildKit + GHA 캐싱으로 재빌드 시 의존성 레이어 재사용
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: main-server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short-sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================================
  # Job 3: Deploy — GKE에 Kustomize로 배포
  # ================================================================
  deploy:
    name: 🚀 Deploy to GKE
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@v4

      # ── GCP 인증 ──
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── GKE Credentials ──
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      # ── K8s Secrets 생성/업데이트 ──
      # 💡 포트폴리오 POINT: GitHub Secrets → K8s Secrets로 안전하게 전달
      # kubectl create secret으로 선언적으로 관리하되,
      # --dry-run=client + kubectl apply로 멱등성(idempotent) 보장
      - name: Create/Update K8s Secrets
        run: |
          kubectl create secret generic tutti-secrets \
            --namespace=tutti \
            --from-literal=supabase-db-url="${{ secrets.SUPABASE_DB_URL }}" \
            --from-literal=supabase-db-username="${{ secrets.SUPABASE_DB_USERNAME }}" \
            --from-literal=supabase-db-password="${{ secrets.SUPABASE_DB_PASSWORD }}" \
            --from-literal=supabase-key="${{ secrets.SUPABASE_KEY }}" \
            --from-literal=supabase-url="${{ secrets.SUPABASE_URL }}" \
            --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" \
            --from-literal=ai-server-url="${{ secrets.AI_SERVER_URL }}" \
            --from-literal=ai-server-host="${{ secrets.AI_SERVER_HOST }}" \
            --from-literal=callback-base-url="${{ secrets.CALLBACK_BASE_URL }}" \
            --from-literal=ai-callback-secret="${{ secrets.AI_CALLBACK_SECRET }}" \
            --from-literal=ai-server-api-key="${{ secrets.AI_SERVER_API_KEY }}" \
            --from-literal=cf-access-client-id="${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            --from-literal=cf-access-client-secret="${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            --from-literal=google-client-id="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=google-client-secret="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --from-literal=redis-host="${{ secrets.REDIS_HOST }}" \
            --from-literal=redis-port="${{ secrets.REDIS_PORT }}" \
            --from-literal=redis-password="${{ secrets.REDIS_PASSWORD }}" \
            --from-literal=redis-tls="${{ secrets.REDIS_TLS }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic cloudflare-tunnel-secret \
            --namespace=tutti \
            --from-literal=tunnel-token="${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # 모니터링 네임스페이스 및 Supabase Pooler 접속 시크릿 배포
          # ⚠️ Pooler 유저명은 postgres.{project_ref} 형식 (SUPABASE_DB_USERNAME과 다름)
          export RAW_USER="${{ secrets.SUPABASE_POOLER_USERNAME }}"
          export RAW_PASS="${{ secrets.SUPABASE_DB_PASSWORD }}"
          DATA_SOURCE_URI=$(python3 -c "
          import urllib.parse, os
          user = urllib.parse.quote(os.environ['RAW_USER'])
          password = urllib.parse.quote(os.environ['RAW_PASS'])
          print(f'postgresql://{user}:{password}@aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require')
          ")
          kubectl get namespace monitoring 2>/dev/null || kubectl create namespace monitoring
          kubectl create secret generic supabase-monitor-secret \
            --namespace=monitoring \
            --from-literal=data-source-uri="$DATA_SOURCE_URI" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Grafana 관리자 비밀번호 (kube-prometheus-stack existingSecret 참조)
          kubectl create secret generic grafana-admin-secret \
            --namespace=monitoring \
            --from-literal=admin-user=admin \
            --from-literal=admin-password="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── 네임스페이스 확인 (리소스 배포 전 반드시 존재해야 함) ──
      - name: Ensure namespace exists
        run: kubectl get namespace tutti 2>/dev/null || kubectl create namespace tutti

      # ── Kustomize로 이미지 태그 업데이트 & 배포 ──
      # 💡 포트폴리오 POINT: Kustomize로 base manifest 수정 없이 이미지 태그 교체
      - name: Deploy with Kustomize
        run: |
          cd k8s/base

          # 이미지 태그를 현재 커밋 SHA로 업데이트
          kustomize edit set image \
            REGION-docker.pkg.dev/PROJECT_ID/tutti/main-server=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}

          # Kustomize build & server-side apply
          # 💡 --server-side: HPA가 관리하는 replicas 필드를 덮어쓰지 않음
          kubectl apply -k . --server-side --force-conflicts

      # ── 배포 상태 확인 ──
      - name: Verify deployment
        run: |
          echo "⏳ Waiting for main-server rollout..."
          kubectl rollout status deployment/main-server -n tutti --timeout=300s

          echo "⏳ Waiting for cloudflared rollout..."
          kubectl rollout status deployment/cloudflared -n tutti --timeout=120s

          echo ""
          echo "✅ Deployment successful!"
          echo "📋 Current pods:"
          kubectl get pods -n tutti -o wide

      # ══════════════════════════════════════════════════════════
      # 모니터링 스택 자동 배포 (변경이 있을 경우만)
      # ══════════════════════════════════════════════════════════
      - name: Detect monitoring changes
        id: mon
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- k8s/monitoring/ 2>/dev/null || echo "")
          echo "📋 Changed monitoring files:"
          echo "$CHANGED"

          # Helm values 변경 감지
          echo "$CHANGED" | grep -q "kube-prometheus-stack-values.yaml" && echo "prometheus=true" >> "$GITHUB_OUTPUT" || true
          echo "$CHANGED" | grep -q "loki-values.yaml" && echo "loki=true" >> "$GITHUB_OUTPUT" || true
          echo "$CHANGED" | grep -q "promtail-values.yaml" && echo "promtail=true" >> "$GITHUB_OUTPUT" || true

          # kubectl manifest 변경 감지
          echo "$CHANGED" | grep -qE "(servicemonitor|exporter|alert-rules|namespace|dashboards/)" && echo "manifests=true" >> "$GITHUB_OUTPUT" || true

      - name: Setup Helm
        if: steps.mon.outputs.prometheus || steps.mon.outputs.loki || steps.mon.outputs.promtail
        uses: azure/setup-helm@v4

      - name: Deploy monitoring stack (Helm)
        if: steps.mon.outputs.prometheus || steps.mon.outputs.loki || steps.mon.outputs.promtail
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
          helm repo add grafana https://grafana.github.io/helm-charts --force-update
          helm repo update

          cd k8s/monitoring

          if [ "${{ steps.mon.outputs.prometheus }}" = "true" ]; then
            echo "📊 Upgrading kube-prometheus-stack..."
            helm upgrade prometheus prometheus-community/kube-prometheus-stack \
              -n monitoring -f kube-prometheus-stack-values.yaml --install --wait --timeout=5m
          fi

          if [ "${{ steps.mon.outputs.loki }}" = "true" ]; then
            echo "📝 Upgrading Loki..."
            helm upgrade loki grafana/loki \
              -n monitoring -f loki-values.yaml --install --wait --timeout=5m
          fi

          if [ "${{ steps.mon.outputs.promtail }}" = "true" ]; then
            echo "📋 Upgrading Promtail..."
            helm upgrade promtail grafana/promtail \
              -n monitoring -f promtail-values.yaml --install --wait --timeout=3m
          fi

          echo "✅ Helm upgrades complete"

      - name: Deploy monitoring manifests (kubectl)
        if: steps.mon.outputs.manifests
        run: |
          cd k8s/monitoring
          echo "🔧 Applying monitoring manifests..."
          kubectl apply -f namespace.yaml
          kubectl apply -f main-server-servicemonitor.yaml
          kubectl apply -f cloudflared-servicemonitor.yaml
          kubectl apply -f postgres-exporter.yaml
          kubectl apply -f alert-rules.yaml

          # 대시보드 ConfigMap 생성 (Python 스크립트)
          python3 dashboards/build_dashboard.py
          kubectl apply -f dashboards/tutti-overview-cm.yaml

          echo "✅ Monitoring manifests applied"

